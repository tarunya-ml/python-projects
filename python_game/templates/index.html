<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎮 Number Guessing Game</h1>
        <p>Guess a number between 1 and 100</p>

        <form method="POST">
            <input 
                type="number" 
                name="guess" 
                id="guessInput"
                placeholder="Enter your guess" 
                min="1" 
                max="100"
                required 
                autofocus
            >
            <button type="submit">Submit</button>
        </form>

        <h3>{{ message }}</h3>

        {% if game_over %}
            <div class="stats">
                <p><strong>Highest Score:</strong> {{ stats["highest score"] }}</p>
                <p><strong>Total Games Played:</strong> {{ stats["total games played"] }}</p>
                <p><strong>Last Score:</strong> {{ stats["last score"] }}</p>
            </div>

            <a href="/restart">
                <button>Play Again</button>
            </a>
        {% endif %}
    </div>

    <script>
        // Always focus input after page loads
        window.onload = function() {
            const input = document.getElementById("guessInput");
            input.focus();
        };

        // Keep focus after form submit
        document.querySelector("form").addEventListener("submit", function() {
            setTimeout(() => {
                document.getElementById("guessInput").focus();
            }, 10);
        });
    </script>
</body>
</html>
